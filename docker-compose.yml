services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_memmail
      POSTGRES_USER: ai_memmail
      POSTGRES_PASSWORD: ai_memmail
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_memmail -d ai_memmail"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ai-memmail:local
    build: .
    environment:
      AI_MEMMAIL_CONFIG: /app/config/config.yaml
      AI_MEMMAIL_BIND: 0.0.0.0:8080
      CONTROL_PANEL_KEY: ${CONTROL_PANEL_KEY:?CONTROL_PANEL_KEY is required}
    ports:
      - "18080:8080"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml
      - ./prompts:/app/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
