name: Publish prerelease Docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing prerelease Git tag to publish, without refs/tags/ (example: v0.1.0-rc.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Existing prerelease Git tag to publish, without refs/tags/ (example: v0.1.0-rc.0)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*-*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build and push prerelease image
    runs-on: rootless-docker
    timeout-minutes: 45

    steps:
      - name: Validate prerelease tag
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_TAG}" ]]; then
            tag="${INPUT_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+$ ]]; then
            echo "::error::publish-image only builds prerelease tags like v0.1.0-rc.0"
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Configure Docker credentials path
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/.docker"
          echo "DOCKER_CONFIG=${RUNNER_TEMP}/.docker" >> "$GITHUB_ENV"

      - name: Log in to registry
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: echo "${GITHUB_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          context: git
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
