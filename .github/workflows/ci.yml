name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  line-size:
    runs-on: docker-runner
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: scripts/check-line-size.sh

  backend:
    runs-on: docker-runner
    timeout-minutes: 60
    needs: line-size
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75.0
        with:
          components: rustfmt
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo fmt --all --check
      - run: >-
          cargo test --workspace -- --skip storage_pg::tests::
      - run: >-
          cargo llvm-cov --workspace --lib --fail-under-lines 90
          --ignore-filename-regex 'rustc-.*library|src/main.rs|src/.*/tests.rs|src/.*/tests/.*|src/[^/]+/tests.rs|src/ai.rs|src/ai_external.rs|src/mail_external.rs|src/storage_pg.rs|src/storage_pg/.*|src/web.rs|src/web/.*|src/worker.rs|src/worker/.*'
          -- --skip storage_pg::tests::

  frontend:
    runs-on: docker-runner
    timeout-minutes: 30
    needs: line-size
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run test:coverage
      - working-directory: web
        run: npm run build
