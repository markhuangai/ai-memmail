name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: docker-runner
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75.0
        with:
          components: rustfmt
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo fmt --all --check
      - run: >-
          cargo test --workspace -- --skip storage_pg::tests::
      - run: >-
          cargo llvm-cov --workspace --lib --fail-under-lines 90
          --ignore-filename-regex 'rustc-.*library|src/main.rs|src/ai_external.rs|src/mail_external.rs|src/storage_pg.rs|src/web.rs|src/worker.rs'
          -- --skip storage_pg::tests::

  frontend:
    runs-on: docker-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run test:coverage
      - working-directory: web
        run: npm run build
